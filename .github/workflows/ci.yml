name: 'CI: lint, typecheck and build'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']
  workflow_dispatch:

env:
  NODE_VERSION: 24.x

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci
      - run: npm run style-lint
      - run: npm run lint

      # Build must precede typecheck: mysa2mqtt resolves mysa-js-sdk and mqtt2ha
      # through workspace symlinks whose `types` point at their dist/ output.
      - run: npm run build
      - run: npm run typecheck --workspaces --if-present
      - run: npm test

  docker:
    # Build (without pushing) so Dockerfile breakage surfaces on the PR rather
    # than during a release.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./packages/mysa2mqtt/Dockerfile
          cache-from: type=gha
          cache-to: type=gha,mode=max
          push: false
          load: true
          tags: mysa2mqtt:ci

      - name: Smoke test
        run: |
          docker run --rm mysa2mqtt:ci --help
          docker run --rm --entrypoint node mysa2mqtt:ci \
            -e "import('mysa-js-sdk').then(m => console.log('sdk ok', Object.keys(m).length))"
